<!DOCTYPE html>

<head><script>window.APP_DATA = [{"id":1,"title":"静夜思","content":"床前明月光，\n疑是地上霜。\n举头望明月，\n低头思故乡。","author":"李白","dynasty":"唐","theme":"思乡","notes":"明月光：月光。疑是地上霜：似乎地上有霜。举头：抬头。低头：低头。","appreciation":"全诗仅二十字，却以月光为媒，写出游子深深的乡思，语言朴素而意境深远。","background":"李白长期漂泊在长安，夜思故乡而作此诗。","imageUrl":"https://example.com/images/jingyesi.jpg"},{"id":2,"title":"春晓","content":"春眠不觉晓，\n处处闻啼鸟。\n夜来风雨声，\n花落知多少。","author":"孟浩然","dynasty":"唐","theme":"春景","notes":"春眠：春天的睡眠。啼鸟：鸟儿啼叫。风雨声：夜间风雨的声音。","appreciation":"诗以春晨的景象写出对春天的喜爱与惜春之情，末两句转而叹花落之多，增添了感慨。","background":"作者隐居鹿门山，春日晨起所作。","imageUrl":"https://example.com/images/chunxiao.jpg"},{"id":3,"title":"登鹳雀楼","content":"白日依山尽，\n黄河入海流。\n欲穷千里目，\n更上一层楼。","author":"王之涣","dynasty":"唐","theme":"壮志","notes":"白日：太阳。依山尽：山尽处。欲穷千里目：想要把目光伸展到千里之外。更上一层楼：再登高楼。","appreciation":"前两句写壮阔的自然景象，后两句劝人要有进取精神，寓意深远。","background":"作者在山西鹳雀楼登高远望所作。","imageUrl":"https://example.com/images/dengguanque.jpg"},{"id":4,"title":"赋得古原草送别","content":"离离原上草，\n一岁一枯荣。\n野火烧不尽，\n春风吹又生。\n远芳侵古道，\n晴翠接荒城。\n又送王孙去，\n萋萋满别情。","author":"白居易","dynasty":"唐","theme":"送别","notes":"离离：草木茂盛貌。枯荣：枯萎与繁荣。野火：野外的火。春风：春天的风。萋萋：草木茂盛的样子。","appreciation":"以草的顽强生命力比喻友情的永恒，结尾点题，情感真挚。","background":"作者送别友人王孙时所作，草原景象激发感慨。","imageUrl":"https://example.com/images/gucao.jpg"},{"id":5,"title":"江雪","content":"千山鸟飞绝，\n万径人踪灭。\n孤舟蓑笠翁，\n独钓寒江雪。","author":"柳宗元","dynasty":"唐","theme":"孤独","notes":"千山：众多山峰。鸟飞绝：鸟儿都飞走。万径：无数小路。人踪灭：没有人迹。蓑笠翁：戴蓑衣、戴笠的老翁。","appreciation":"通过极致的寂寥景象，突出孤钓老人的独立与超脱，意境空寂而深远。","background":"作者贬谪永州时，江上捕雪景象所感而作。","imageUrl":"https://example.com/images/jiangxue.jpg"},{"id":6,"title":"望庐山瀑布","content":"日照香炉生紫烟，\n遥看瀑布挂前川。\n飞流直下三千尺，\n疑是银河落九天。","author":"李白","dynasty":"唐","theme":"山水","notes":"香炉：庐山的香炉峰。紫烟：早晨的雾气呈紫色。飞流：水流飞泻。三千尺：夸张的高度。银河：天河。","appreciation":"夸张的比喻与想象，使瀑布的壮丽景象跃然纸上，充满浪漫色彩。","background":"作者游庐山时，见瀑布而有此感。","imageUrl":"https://example.com/images/wanglubu.jpg"},{"id":7,"title":"早发白帝城彩云间","content":"朝辞白帝彩云间，\n千里江陵一日还。\n两岸猿声啼不住，\n轻舟已过万重山。","author":"李白","dynasty":"唐","theme":"速行","notes":"白帝城：今重庆奉节。彩云间：彩云缭绕之处。江陵：今湖北荆州。猿声：猿猴叫声。轻舟：小船。万重山：众多山峰。","appreciation":"诗写行船之快，景物之美，情感之豪放，语言朗朗上口。","background":"作者被赦免后，从白帝城东下江陵途中所作。","imageUrl":"https://example.com/images/zhaobaidi.jpg"},{"id":8,"title":"黄鹤楼送孟浩然之广陵","content":"故人西辞黄鹤楼，\n烟花三月下扬州。\n孤帆远影碧空尽，\n唯见长江天际流。","author":"李白","dynasty":"唐","theme":"送别","notes":"故人：指孟浩然。黄鹤楼：武汉的名楼。烟花三月：春天的景色。扬州：今江苏扬州。孤帆：单帆船。碧空尽：天边尽头。长江天际流：长江奔向天边。","appreciation":"送别之情与壮阔的江景交织，末句“唯见长江天际流”余音绕梁，意境深远。","background":"作者在黄鹤楼送别友人孟浩然前往扬州时所作。","imageUrl":"https://example.com/images/songmeng.jpg"},{"id":9,"title":"夜思","content":"床前明月光，\n疑是地上霜。\n举头望明月，\n低头思故乡。","author":"李白","dynasty":"唐","theme":"思乡","notes":"与《静夜思》同一首诗，此处重复仅为示例，实际数据请勿重复。","appreciation":"同上。","background":"同上。","imageUrl":"https://example.com/images/yesi.jpg"},{"id":10,"title":"行路难·其一","content":"金樽清酒斗十千，\n玉盘珍羞直万金。\n停杯投箸不能食，\n拔剑四顾心茫然。\n欲渡黄河冰塞川，\n将登太行雪满山。\n闲来垂钓碧溪上，\n忽复乘舟梦日边。","author":"李白","dynasty":"唐","theme":"感慨","notes":"金樽：金制酒杯。清酒：美酒。斗十千：价值极高。玉盘：玉制盘子。珍羞：美味佳肴。直万金：价值连城。停杯投箸：放下酒杯和筷子。拔剑四顾：拔剑环顾。心茫然：心里茫然。黄河：中国北方大河。太行：山脉名。碧溪：绿色的小溪。乘舟梦日边：想象乘船到达日边。","appreciation":"诗写豪放不羁的生活与理想的挫折，语气激昂，想象丰富，充满浪漫主义色彩。","background":"作者在经历仕途失意后，抒发对官场的不满与对自由生活的向往。","imageUrl":"https://example.com/images/xinglunan.jpg"},{"id":11,"title":"静夜思（另一版本）","content":"床前明月光，\n疑是地上霜。\n举头望明月，\n低头思故乡。","author":"李白","dynasty":"唐","theme":"思乡","notes":"此为《静夜思》的另一种抄本，内容相同。","appreciation":"同上。","background":"同上。","imageUrl":"https://example.com/images/jingyesi2.jpg"},{"id":12,"title":"春夜喜雨","content":"好雨知时节，\n当春乃发生。\n随风潜入夜，\n润物细无声。\n野径云俱黑，\n江船火独明。\n晓看红湿处，\n花重锦官城。","author":"杜甫","dynasty":"唐","theme":"雨景","notes":"好雨：及时的春雨。知时节：知道时候。当春乃发生：在春天的时候才会下。随风潜入夜：随风悄悄地进入夜晚。润物细无声：滋润万物却无声响。野径：田野小路。云俱黑：云色全黑。江船火独明：江上的船只有火光明亮。晓看：早晨观看。红湿处：被雨打湿的花。花重：花朵沉甸甸的。锦官城：成都的别称。","appreciation":"诗以细腻的笔触描写春雨的润物无声，既写景又抒情，语言平淡而意境深远。","background":"作者居成都草堂时，观春雨而感，写下此诗。","imageUrl":"https://example.com/images/chunnyuxi.jpg"},{"id":13,"title":"茅屋为秋风所破歌","content":"八月秋高风怒号，\n卷我屋上三重茅。\n床头船尾狼藉足，\n寒衣不到身。\\n不知寒暑，但觉身如在车中。\n明日复明日，何其穷也！\n俯首甘为孺子牛。","author":"杜甫","dynasty":"唐","theme":"民生","notes":"八月秋高：八月的秋天天气高朗。风怒号：风怒吼。卷我屋上三重茅：把我屋子上面的三层茅草卷走。床头船尾狼藉足：床头和船尾都乱糟糟的。寒衣不到身：寒冷的衣服还没穿到身上。不知寒暑：不分寒暑。身如在车中：感觉身体像在车里颠簸。明日复明日：一天天过去。何其穷也：多么贫穷啊。俯首甘为孺子牛：愿意低头像老牛一样为孩子们劳动。","appreciation":"诗写诗人屋被秋风吹破的惨状，深刻反映了唐代农民的难生活，情感真挚，语言质朴。","background":"作者在成都草堂遭遇秋风破屋，感慨而作。","imageUrl":"https://example.com/images/maowu.jpg"},{"id":14,"title":"江畔独步寻花·其六","content":"黄师塔前江水东，\n春光懒困倚微风。\n桃李满枝春色动，\n何须更待杏花红。","author":"杜甫","dynasty":"唐","theme":"春花","notes":"黄师塔：江边的塔。江水东：江水向东流。春光懒困：春天的光景让人感到懒散困倦。倚微风：靠着微风。桃李满枝：桃树和李树枝头满是花。春色动：春色动人。杏花红：杏花红艳。何须更待：不必再等待。","appreciation":"诗写春日江边散步赏花的悠闲情趣，语言轻快，意境明亮。","background":"作者在成都草堂附近的江边漫步时所作。","imageUrl":"https://example.com/images/jiangpan.jpg"},{"id":15,"title":"登高","content":"风急天高猿啸哀，\n渚清沙白鸟飞回。\n无边落木萧萧下，\n不尽长江滚滚来。\n万里悲秋常作客，\n百年多病独登台。\n艰难苦恨繁霜鬓，\n潦倒停浊倘盈杯。","author":"杜甫","dynasty":"唐","theme":"登高","notes":"风急：风很急。天高：天空很高。猿啸哀：猿猴的叫声悲哀。渚：水中的小岛。沙白：沙子颜色白。鸟飞回：鸟儿飞回来。无边落木：无边无际的落叶。萧萧下：落叶飘落的声音。不尽长江：长江水流不尽。滚滚来：滚滚向前。万里悲秋：千里之外的秋天令人悲伤。常作客：常常作为客旅。百年多病：虽然活到百岁却多病。独登台：独自登高台。艰难苦恨：艰难困苦，怨恨繁多。繁霜鬓：鬓角已有霜白。潦倒：落魄。停浊：停止浊酒。倘盈杯：如果能满杯。","appreciation":"全诗气势宏大，景象交织，情感深沉，被誉为唐诗七律之巅峰。","background":"作者在两岁儿子死后，重阳登高而感时伤怀，作此诗。","imageUrl":"https://example.com/images/denggao.jpg"},{"id":16,"title":"望岳","content":"岱宗夫如何？\n齐鲁青未了。\n造化钟神秀，\n阴阳割昏晓。\n荡胸生曾云，\n决眦入归鸟。\n会当凌绝顶，\n一览众山小。","author":"杜甫","dynasty":"唐","theme":"登山","notes":"岱宗：泰山的别称。夫如何：是什么样子。齐鲁：今山东地区。青未了：青色没有结束。造化：自然的造化。钟神秀：聚集了神秀之气。阴阳：阴阳二气。割昏晓：分别黑暗和黎明。荡胸：激荡胸怠。曾云：层层云雾。决眦：睁大眼睛。归鸟：归巢的鸟。会当凌绝顶：一定能够登上最高点。一览众山小：俯视众山皆显得渺小。","appreciation":"诗写登泰山的壮志与宏大气象，后两句“会当凌绝顶，一览众山小”成为千古名句，激励后人。","background":"作者曾经登泰山而有感，写下此诗。","imageUrl":"https://example.com/images/wangyue.jpg"},{"id":17,"title":"春望","content":"国破山河在，\n城春草木深。\n感时花溅泪，\n恨惊鸟惊心。\n烽火连三月，\n家书抵万金。\n白头搔更短，\n浑欲不胜簪。","author":"杜甫","dynasty":"唐","theme":"战乱","notes":"国破：国家被破坏。山河在：山河仍然存在。城春：春天的城市。草木深：草木茂盛。感时：感慨时事。花溅泪：花朵像泪水一样。恨惊：怨恨惊动。鸟惊心：鸟儿的叫声让人心惊。烽火：战争的信号。连三月：持续三个月。家书：家中的信件。抵万金：价值相当于万金。白头：白发。搔更短：抓挠使头发更短。浑欲不胜簪：几乎要不能再戴发簪。","appreciation":"诗以破国之痛写出对国家的深切担忧与对家人的思念，情感真挚，语言凝练。","background":"作者在安史之乱期间，长安被 rebel 攻占，流寓成都时所作。","imageUrl":"https://example.com/images/chunwang.jpg"},{"id":18,"title":"兵车行","content":"车辚车辚，\n马萧萧。\n行人弓箭，\n各在腰间。\n耶娘妻子，\n走送尘埃里。\n暮去山中，\n白髮女子，\n啼哭声，\n随风入夜。\n君不见，\n青海头，\n古来白骨，\n无人收。","author":"杜甫","dynasty":"唐","theme":"战争","notes":"车辚车辚：车辆滚动的声音。马萧萧：马蹄声。行人弓箭：行人携带弓箭。各在腰间：各自挂在腰间。耶娘妻子：老妇人和妻子。走送尘埃里：送行的人走进尘土。暮去山中：傍晚进入山中。白髮女子：白发的老妇人。啼哭声：哭泣的声音。随风入夜：声音随风飘入夜晚。君不见：您没有看到吗。青海头：青海的上游。古来白骨：自古以来的白骨。无人收：无人收葬。","appreciation":"诗写征战带来的百姓苦难，语言质朴，情感深沉，是杜甫反战的代表作之一。","background":"作者在安史之乱期间，目送征兵北上，感慨而作。","imageUrl":"https://example.com/images/bingche.jpg"},{"id":19,"title":"枫桥夜泊","content":"月落乌啼霜满天，江枫渔火对愁眠。姑苏城外寒山寺，夜半钟声到客船。","author":"张继","dynasty":"唐代","theme":"思乡","annotation":"枫桥：今江苏苏州枫桥。寒山寺：寺名，钟声悠扬。","appreciation":"全诗以夜色寒凉烘托离愁，钟声与渔火相映，营造出寂寥而又深沉的意境。","background":"诗人夜泊枫桥，听闻寒山寺的钟声，思念故乡。","image_url":"https://example.com/images/fengqiao.jpg"},{"id":20,"title":"九月九日忆山东兄弟","content":"独在异乡为异客，每逢佳节倍思亲。遥知兄弟登高处，遍插茱萸少一人。","author":"王维","dynasty":"唐代","theme":"思亲","annotation":"九月九日：重阳节。茱萸：重阳节的习俗。","appreciation":"借重阳登高的传统，抒发对远在山东兄弟的思念，情感真挚。","background":"王维在长安任职，重阳节思念远在山东的亲人。","image_url":"https://example.com/images/chongyang.jpg"},{"id":21,"title":"春夜洛阳寺","content":"春风又绿江南岸，灯火阑珊寺里禅。独坐禅房听雨声，心随流水到天涯。","author":"杜牧","dynasty":"唐代","theme":"禅意","annotation":"洛阳寺：古寺名，春风指春季。","appreciation":"诗中春景与禅意交织，借雨声暗示心境的清净与流转。","background":"杜牧晚年隐居洛阳寺，感受春夜的宁静。","image_url":"https://example.com/images/luoyangsi.jpg"},{"id":22,"title":"黄鹤楼送别","content":"昔人已乘黄鹤去，此地空余黄鹤楼。黄鹤一去不复返，白云千载空悠悠。","author":"崔颢","dynasty":"唐代","theme":"送别","annotation":"黄鹤楼：武汉名楼，传说黄鹤化为仙鹤。","appreciation":"以黄鹤的传说象征别离的永恒感，语言简练而意境深远。","background":"诗人登楼远眺，感怀古人已逝，送别友人。","image_url":"https://example.com/images/huanghe.jpg"},{"id":23,"title":"秋夜将晓出篱门迎凉有感二首·其一","content":"银烛秋光冷画屏，轻罗小扇扑流萤。天阶夜色凉如水，卧看牵牛织女星。","author":"杜甫","dynasty":"唐代","theme":"秋夜","annotation":"银烛：秋夜灯烛。牵牛织女：星宿名。","appreciation":"描写秋夜清凉，灯光与流萤相映，星辰点缀，情景交融。","background":"杜甫在成都郊外的秋夜，感受季节变换。","image_url":"https://example.com/images/qiuye.jpg"},{"id":24,"title":"送别","content":"山中相送罢，日暮掩柴扉。春草年年绿，离别恨无期。","author":"王之涣","dynasty":"唐代","theme":"送别","annotation":"掩柴扉：关门不出。","appreciation":"以山林的寂静映衬离别的凄凉，春草暗示时光流逝。","background":"王之涣送友人入山，暮色中别离。","image_url":"https://example.com/images/shanzhong.jpg"},{"id":25,"title":"咏柳","content":"碧玉妆成一树高，万条垂下绿丝绦。春风不度玉门关，轻拂江南万里涛。","author":"贺知章","dynasty":"唐代","theme":"春景","annotation":"玉门关：古代边关，喻春风难及。","appreciation":"用玉的光泽形容柳条，生动描绘春柳的柔美与生机。","background":"贺知章在长安春游，观赏城外垂柳。","image_url":"https://example.com/images/yingliu.jpg"},{"id":26,"title":"夜泊牛渚怀古","content":"牛渚西江夜，青灯古寺灯。潮声随月去，孤帆映星明。","author":"李白","dynasty":"唐代","theme":"怀古","annotation":"牛渚：长江三峡之一。","appreciation":"借江潮、明月、孤帆营造出古寺夜泊的寂寥氛围，抒发对往事的感慨。","background":"李白泛舟长江，夜宿牛渚，思古情深。","image_url":"https://example.com/images/niuzhu.jpg"},{"id":27,"title":"登岳阳楼","content":"昔闻洞庭水，今上岳阳楼。万里悲秋常作客，百年多病独登楼。","author":"杜甫","dynasty":"唐代","theme":"感怀","annotation":"洞庭：洞庭湖，岳阳楼名胜。","appreciation":"以个人漂泊与多病之感，映射天下苍茫，情深意重。","background":"杜甫因战乱辗转至岳阳，登楼抒怀。","image_url":"https://example.com/images/yueyanglou.jpg"},{"id":28,"title":"梅花","content":"墙角数枝梅，凌寒独自开。遥知不是雪，争渡春风来。","author":"王安石","dynasty":"宋代","theme":"坚韧","annotation":"凌寒：在寒冷中开放。","appreciation":"以梅花独自开放象征不屈不挠的精神，语言清新。","background":"王安石任职时，常在庭院观梅。","image_url":"https://example.com/images/meihua.jpg"},{"id":29,"title":"渔舟唱晚","content":"暮色沉江水，渔歌随波去。星稀灯火远，归帆点点斜。","author":"柳永","dynasty":"宋代","theme":"田园","annotation":"渔舟：捕鱼的小船。","appreciation":"描绘江面暮色与渔歌相伴的宁静画面，意境悠远。","background":"柳永在江南水乡度假，夜观渔舟。","image_url":"https://example.com/images/yuzhou.jpg"},{"id":30,"title":"秋思","content":"秋风萧瑟黄叶落，孤雁南飞暮色寒。思乡情绪如潮水，泪滴枯枝不成眠。","author":"李清照","dynasty":"宋代","theme":"思乡","annotation":"孤雁：象征离别。","appreciation":"李清照以细腻笔触描写秋夜思乡，情感真切。","background":"李清照被金兵俘虏后，思念故乡。","image_url":"https://example.com/images/qiusi.jpg"},{"id":31,"title":"题西林壁","content":"横看成岭侧成峰，远近高低各不同。不识庐山真面目，只缘身在此山中。","author":"苏轼","dynasty":"宋代","theme":"哲理","annotation":"西林壁：寺院壁画。","appreciation":"以山的不同视角比喻人对事物的局限，哲理深远。","background":"苏轼被贬黄州，游西林寺时作。","image_url":"https://example.com/images/xilin.jpg"},{"id":32,"title":"夜泊秦淮","content":"灯火阑珊秦淮岸，酒香随风入梦寒。谁家笛声惊夜雨，孤舟摇曳映星残。","author":"杜牧","dynasty":"唐代","theme":"夜景","annotation":"秦淮：南京的秦淮河。","appreciation":"通过灯火、酒香、笛声营造繁华而略带凄凉的夜色。","background":"杜牧在南京任职，夜泊秦淮。","image_url":"https://example.com/images/qinhai.jpg"},{"id":33,"title":"春日偶成","content":"草长莺飞二月天，拂堤柳色入青帘。桃花流水人间路，笑看春风满袖前。","author":"杨万里","dynasty":"宋代","theme":"春景","annotation":"拂堤柳：河堤旁的柳树。","appreciation":"描绘春日田园的活泼景象，语言轻快明朗。","background":"杨万里在江南乡间散步时即兴而作。","image_url":"https://example.com/images/chunri.jpg"},{"id":34,"title":"山居秋暝","content":"空山新雨后，天气晚来秋。明月松间照，清泉石上流。","author":"王维","dynasty":"唐代","theme":"山水","annotation":"空山：无人山谷。","appreciation":"以雨后清新的山色、明月松光、清泉石流，构成宁静的秋夜图。","background":"王维隐居山中，雨后观景。","image_url":"https://example.com/images/shanqu.jpg"},{"id":35,"title":"江城子·密州出猎","content":"老夫聊发少年狂，左牵黄犬右擎羊。锦帽貂裘，千骑卷平原。为报倾城，尽得英雄气。","author":"苏轼","dynasty":"宋代","theme":"豪迈","annotation":"锦帽貂裘：贵族服饰。","appreciation":"气势磅礴，展现豪放不羁的壮志。","background":"苏轼密州任职时，亲自参加狩猎。","image_url":"https://example.com/images/mizhou.jpg"},{"id":36,"title":"望洞庭","content":"八月湖水平如镜，荷花摇曳映红星。远山如黛云雾里，渔歌一曲送暮声。","author":"刘禹锡","dynasty":"唐代","theme":"湖光","annotation":"八月：夏季盛荷时。","appreciation":"以湖面如镜、荷花与渔歌描绘洞庭的宁静夏夜。","background":"刘禹锡在洞庭湖畔驻足观景。","image_url":"https://example.com/images/dongting.jpg"},{"id":37,"title":"秋夜将晓出篱门迎凉有感二首·其二","content":"寒灯独坐倚疏篱，秋风萧瑟入帘迟。星河欲坠银河暗，梦里江山总成诗。","author":"杜甫","dynasty":"唐代","theme":"秋夜","annotation":"疏篱：稀疏的篱笆。","appreciation":"以孤灯、秋风、星河交织，表现诗人对时局的沉思与不安。","background":"杜甫在成都郊外的秋夜，感怀国家动荡。","image_url":"https://example.com/images/qiuyue2.jpg"},{"id":38,"title":"相思","content":"红豆生南国，春来发几枝。愿君多采撷，此物最相思。","author":"王维","dynasty":"唐","theme":"思念","annotation":"红豆象征相思，春天发芽喻情意萌生。","appreciation":"全诗语言简练，却以红豆寄托深切的相思之情，意境清新而悠远。","background":"王维在京城任职期间，常思念远在他乡的亲友，遂作此诗以寄情。","image_url":"https://example.com/images/xiangsi.jpg"},{"id":39,"title":"夜雨寄北","content":"君问归期未有期，巴山夜雨涨秋池。何当共剪西窗烛，却话巴山夜雨时。","author":"李商隐","dynasty":"唐","theme":"离别","annotation":"巴山指巴蜀地区，夜雨象征愁绪。","appreciation":"借雨声暗示思念，层层叠叠的情感在雨声中愈加浓郁。","background":"李商隐被贬巴蜀，思念京城亲友，写下此篇以抒离愁。","image_url":"https://example.com/images/night_rain.jpg"},{"id":40,"title":"山中杂诗","content":"山光悦鸟性，潭影空人心。万壑赴荆门，苍松映暮云。","author":"杜甫","dynasty":"唐","theme":"山水","annotation":"描写山中光影与鸟兽的和谐。","appreciation":"以写景抒情，表达诗人对自然的热爱与隐逸情怀。","background":"杜甫在安史之乱后隐居山中，写下此诗以记录山林生活。","image_url":"https://example.com/images/shanzhong.jpg"},{"id":41,"title":"秋夜将晓出篱门迎凉有感二首·其三","content":"银烛秋光冷画屏，轻罗小扇扑流萤。天阶夜色凉如水，坐看牵牛织女星。","author":"刘禹锡","dynasty":"唐","theme":"秋夜","annotation":"银烛、轻罗、流萤皆秋夜常见景象。","appreciation":"诗句清丽，意境凄凉而不失雅致，表现诗人对时光流逝的感慨。","background":"刘禹锡晚年居于洛阳，常在庭院赏秋夜星辰。","image_url":"https://example.com/images/qiuye.jpg"},{"id":42,"title":"咏鹅","content":"鹅，鹅，鹅，曲项向天歌。白毛浮绿水，红掌拨清波。","author":"骆宾王","dynasty":"唐","theme":"儿童","annotation":"描写鹅的形态与动作。","appreciation":"语言活泼，形象生动，是唐代儿童诗的代表作。","background":"骆宾王少年时在京城学诗，常以动物写趣。","image_url":"https://example.com/images/ying_e.jpg"},{"id":43,"title":"塞下曲·其一","content":"月黑雁飞高，单于夜遁逃。欲将轻骑逐，大雪满弓刀。","author":"卢纶","dynasty":"唐","theme":"边塞","annotation":"单于指匈奴首领，描写夜战情形。","appreciation":"气势磅礴，刻画出边疆将士的勇敢与凛冽的战场氛围。","background":"卢纶曾随军镇守边疆，此诗取材于一次突袭。","image_url":"https://example.com/images/saixiaqu.jpg"},{"id":44,"title":"春江花月夜","content":"春江潮水连海平，海上明月共潮生。滟滟随波千万里，何处春江无月光。","author":"张若虚","dynasty":"唐","theme":"春夜","annotation":"春江、潮水、明月交相辉映。","appreciation":"全篇以江潮、月光、花影交织，情景交融，堪称古典诗歌的巅峰。","background":"张若虚在长安任职，常于春夜泛舟江上，感怀宇宙之浩渺。","image_url":"https://example.com/images/chunjiang.jpg"},{"id":45,"title":"秋词","content":"自古逢秋悲寂寥，我言秋日胜春朝。晴空一鹤排云上，便引诗情到碧霄。","author":"刘禹锡","dynasty":"唐","theme":"秋","annotation":"以鹤喻志向，抒发秋的豪情。","appreciation":"逆转传统的秋悲情调，展现诗人乐观胸怀。","background":"刘禹锡晚年在洛阳，秋季登高作此诗。","image_url":"https://example.com/images/qiuci.jpg"},{"id":46,"title":"江上渔者","content":"江上往来人，却把渔歌唱。潮来潮去声，随风入夜凉。","author":"张志和","dynasty":"唐","theme":"渔歌","annotation":"描写江边渔夫的生活情景。","appreciation":"语言朴实，却把江上夜色与渔歌的悠扬表现得恰到好处。","background":"张志和曾在江南沿岸做官，亲眼目睹渔民生活。","image_url":"https://example.com/images/jiangshangyu.jpg"},{"id":47,"title":"秋夜将晓出篱门迎凉有感二首·其四","content":"蝉噪林逾静，鸟鸣山更幽。露凝寒枝叶，灯火映远舟。","author":"柳宗元","dynasty":"唐","theme":"秋夜","annotation":"蝉声、露水、灯火形成对比。","appreciation":"细腻描写秋夜的寂静与远方的动感，意境深远。","background":"柳宗元被贬永州，常于夜间散步写此。","image_url":"https://example.com/images/qiuyue4.jpg"},{"id":48,"title":"题西林寺","content":"横看成岭侧成峰，远近高低各不同。不识庐山真面目，只缘身在此山中。","author":"苏轼","dynasty":"宋","theme":"哲理","annotation":"以山石比喻人生视角。","appreciation":"哲理深刻，语言通俗，却蕴含禅意。","background":"苏轼在黄州任职期间，常去西林寺参禅。","image_url":"https://example.com/images/xilin.jpg"},{"id":49,"title":"临江仙·滚滚长江东逝水","content":"滚滚长江东逝水，浪花淘尽英雄。是非成败转头空，青山依旧在，几度夕阳红。","author":"杨慎","dynasty":"明","theme":"历史感慨","annotation":"以江水象征历史的流逝。","appreciation":"气势宏大，抒发对历史兴衰的慨叹。","background":"明代文人杨慎在江南任职，观江而作。","image_url":"https://example.com/images/changjiang.jpg"},{"id":50,"title":"菩萨蛮·书江西造口壁","content":"郁郁苍苍，山色有无中。千山万水，何处是归程？","author":"辛弃疾","dynasty":"宋","theme":"征途","annotation":"写旅途中的迷惘与坚持。","appreciation":"词句豪放，情感激昂，体现词人不屈的意志。","background":"辛弃疾北上抗金途中，途经江西，作此词以记行路艰辛。","image_url":"https://example.com/images/shiji.jpg"},{"诗词ID":1001,"诗词标题":"《咏雪》","诗词全文":"北风卷地白草折，胡天八月即飞雪。\n忽如一夜春风来，千树万树梨花开。","作者":"岑参","朝代":"唐代","主题":"雪景赞美","注释":"胡天指北方边塞；梨花喻雪。","赏析":"全诗以夸张手法描绘塞北雪景，气势宏大，意境清冷，展现边塞将士的豪迈与自然的壮美。","背景介绍":"写于唐代安史之乱前后，作者在边塞驻守，目睹大雪纷飞。","配图URL":"https://example.com/images/1001.jpg","id":51},{"诗词ID":1002,"诗词标题":"《夜泊牛渚怀古》","诗词全文":"牛渚西江夜，青灯古佛灯。\n江流天地外，山色有无中。","作者":"杜甫","朝代":"唐代","主题":"怀古思乡","注释":"牛渚古渡，江水流向浩瀚。","赏析":"以夜泊江边的寂静烘托出诗人对历史兴衰的感慨，语言凝练，意境悠远。","背景介绍":"杜甫晚年流寓江陵，途经牛渚，凭吊三国古战场。","配图URL":"https://example.com/images/1002.jpg","id":52},{"诗词ID":1003,"诗词标题":"《秋夜将晓出篱门迎凉有感二首·其五》","诗词全文":"枯藤老树昏鸦，小桥流水人家。\n古道西风瘦马，夕阳西下几时回？","作者":"刘禹锡","朝代":"唐代","主题":"秋暮感怀","注释":"枯藤老树喻时光流逝；瘦马象旅人孤独。","赏析":"以写景起兴，层层递进，营造出凄凉的秋夜氛围，情景交融。","背景介绍":"刘禹锡晚年隐居洛阳，此诗写其秋夜散步所感。","配图URL":"https://example.com/images/1003.jpg","id":53},{"诗词ID":1004,"诗词标题":"《渔翁》","诗词全文":"江上渔翁笑，渔歌随水流。\n日暮归来晚，星光映竹篙。","作者":"白居易","朝代":"唐代","主题":"田园生活","注释":"竹篙指竹制的渔具。","赏析":"语言平易，却蕴含对恬淡生活的向往，节奏如歌。","背景介绍":"白居易任职洛阳时，常在洛河边垂钓，此诗即其所作。","配图URL":"https://example.com/images/1004.jpg","id":54},{"诗词ID":1005,"诗词标题":"《春望》","诗词全文":"国破山河在，城春草木深。\n感时花溅泪，恨别鸟惊心。\n烽火连三月，家书抵万金。\n白头搔更短，浑欲不胜情。","作者":"杜甫","朝代":"唐代","主题":"国破家亡","注释":"“感时花溅泪”指春花让人感伤。","赏析":"在乱世中写春景，情感激烈，语言凝练，展现诗人忧国忧民之情。","背景介绍":"安史之乱后，杜甫在成都草堂所作。","配图URL":"https://example.com/images/1005.jpg","id":55},{"诗词ID":1006,"诗词标题":"《秋词》","诗词全文":"银烛秋光冷画屏，轻罗小扇扑流萤。\n天阶夜色凉如水，坐看牵牛织女星。","作者":"温庭筠","朝代":"唐代","主题":"秋夜情思","注释":"牵牛织女星指牛郎织女星。","赏析":"以细腻的笔触描绘秋夜清凉，情感柔婉，意境如画。","背景介绍":"温庭筠在宫廷任职，常以闺情为题。","配图URL":"https://example.com/images/1006.jpg","id":56},{"诗词ID":1007,"诗词标题":"《夜雨寄北》","诗词全文":"君问归期未有期，巴山夜雨涨秋池。\n何当共剪西窗烛，却话巴山旧时事。","作者":"李商隐","朝代":"唐代","主题":"离别相思","注释":"巴山指蜀道，西窗烛象团聚。","赏析":"以雨声暗示思念，情感绵长而隐晦，语言精炼。","背景介绍":"李商隐被贬蜀后写给远方友人的信中所作。","配图URL":"https://example.com/images/1007.jpg","id":57},{"诗词ID":1008,"诗词标题":"《山居秋暝》","诗词全文":"空山新雨后，天气晚来秋。\n明月松间照，清泉石上流。","作者":"王维","朝代":"唐代","主题":"山林秋景","注释":"空山指无人之山。","赏析":"以写景入情，画面清幽，表现诗人隐逸的心境。","背景介绍":"王维隐居山中，常以自然为题。","配图URL":"https://example.com/images/1008.jpg","id":58},{"诗词ID":1009,"诗词标题":"《送别》","诗词全文":"山中相送罢，日暮掩柴门。\n春草年年绿，离别恨绵绵。","作者":"王之涣","朝代":"唐代","主题":"离别情怀","注释":"掩柴门指归隐之意。","赏析":"情景交织，春草暗喻别后仍有生机，却难掩离愁。","背景介绍":"王之涣送友人赴京，作此送行诗。","配图URL":"https://example.com/images/1009.jpg","id":59},{"诗词ID":1010,"诗词标题":"《咏柳》","诗词全文":"碧条随风舞，轻影映水斜。\n春来万条绿，柔情入画家。","作者":"贺知章","朝代":"唐代","主题":"春柳","注释":"碧条指嫩绿的柳枝。","赏析":"语言轻盈，描写柳姿的柔美，寓意春意盎然。","背景介绍":"贺知章任职江南，常在江岸观柳。","配图URL":"https://example.com/images/1010.jpg","id":60},{"诗词ID":1011,"诗词标题":"《秋思》","诗词全文":"洛阳城里春光好，秋风吹起离别愁。\n黄叶随风落，孤灯照夜久。","作者":"刘禹锡","朝代":"唐代","主题":"秋季离愁","注释":"洛阳指作者故乡。","赏析":"对比春秋两季，表现作者对故土的眷恋与离别的哀伤。","背景介绍":"刘禹锡因官场失意而归乡所作。","配图URL":"https://example.com/images/1011.jpg","id":61},{"诗词ID":1012,"诗词标题":"《春夜喜雨》","诗词全文":"好雨知时节，当春乃发生。\n随风入竹润，万物遂生荣。","作者":"杜甫","朝代":"唐代","主题":"春雨赞美","注释":"好雨指及时的春雨。","赏析":"以雨喻恩，语言朴实却充满哲理，表现对自然的感恩。","背景介绍":"杜甫在成都春雨初至时所作。","配图URL":"https://example.com/images/1012.jpg","id":62},{"诗词ID":1013,"诗词标题":"《登岳阳楼》","诗词全文":"昔闻洞庭水，今上岳阳楼。\n浩荡连天阔，云烟随风流。","作者":"孟浩然","朝代":"唐代","主题":"山水壮阔","注释":"洞庭指洞庭湖。","赏析":"以登楼远眺写浩渺江山，气势宏大，情怀开阔。","背景介绍":"孟浩然游历湖南，登岳阳楼所作。","配图URL":"https://example.com/images/1013.jpg","id":63},{"诗词ID":1014,"诗词标题":"《夜思》","诗词全文":"床前明月光，疑是地上霜。\n举头望明月，低声思故乡。","作者":"李白","朝代":"唐代","主题":"思乡","注释":"与《静夜思》不同，加入低声细语。","赏析":"语言简洁却更添柔情，突显诗人对家乡的深切怀念。","背景介绍":"李白客居长安，夜宿异乡时所写。","配图URL":"https://example.com/images/1014.jpg","id":64},{"诗词ID":1015,"诗词标题":"《春江花月夜》","诗词全文":"春江潮水连海平，海上明月共潮生。\n江流宛转如绸带，花影摇曳映灯灯。","作者":"张若虚","朝代":"唐代","主题":"春江月夜","注释":"潮水连海指江潮浩荡。","赏析":"意境开阔，情景交融，抒发对自然美的赞叹。","背景介绍":"张若虚在江南春游时即兴而作。","配图URL":"https://example.com/images/1015.jpg","id":65},{"诗词ID":1016,"诗词标题":"《塞下曲·其二》","诗词全文":"黄沙百战穿金甲，不破楼兰终不还。\n马嘶风急雪山寒，壮士血染塞外天。","作者":"卢纶","朝代":"唐代","主题":"边塞征战","注释":"楼兰指古代西域城邦。","赏析":"气势雄壮，描绘将士不屈不挠的豪情。","背景介绍":"卢纶在安西都护府任职，亲历边疆战事。","配图URL":"https://example.com/images/1016.jpg","id":66},{"诗词ID":1017,"诗词标题":"《题西林寺》","诗词全文":"山门寂寂钟声远，古木参天影自斜。\n禅心如水不染尘，清风拂袖送余霞。","作者":"寒山","朝代":"唐代","主题":"禅意","注释":"寒山为禅宗诗人。","赏析":"语言淡泊，意境空灵，体现禅宗“无相”之美。","背景介绍":"寒山在西林寺修行时所作。","配图URL":"https://example.com/images/1017.jpg","id":67},{"诗词ID":1018,"诗词标题":"《渔舟唱晚》","诗词全文":"暮色笼江水，渔歌随波去。\n桨声轻敲星光碎，归帆点点映天湖。","作者":"刘禹锡","朝代":"唐代","主题":"渔歌暮景","注释":"天湖指江面如镜。","赏析":"以音律描绘暮色，情景交织，富有画面感。","背景介绍":"刘禹锡晚年隐居洛阳郊外，常观渔舟归来。","配图URL":"https://example.com/images/1018.jpg","id":68},{"诗词ID":1019,"诗词标题":"《秋夜将晓出篱门迎凉有感二首·其六》","诗词全文":"寒灯摇影碎，露重草色新。\n孤雁南归去，星河暗自沉。","作者":"元稹","朝代":"唐代","主题":"秋晨感怀","注释":"孤雁象离别之意。","赏析":"以细腻的描写捕捉清晨的凉意，情感沉静而深远。","背景介绍":"元稹在洛阳郊外散步时所作。","配图URL":"https://example.com/images/1019.jpg","id":69},{"诗词ID":1020,"诗词标题":"《春晓》","诗词全文":"春眠不觉晓，处处闻啼鸟。\n夜来风雨声，花落知多少。","作者":"孟浩然","朝代":"唐代","主题":"春晨","注释":"与李白《春晓》不同，侧重雨声。","赏析":"以听觉描写春晨的宁静与生机，语言清新自然。","背景介绍":"孟浩然春游洛阳郊外，清晨醒来所作。","配图URL":"https://example.com/images/1020.jpg","id":70},{"诗词ID":1001,"诗词标题":"《枫桥夜泊》","诗词全文":"月落乌啼霜满天，江枫渔火对愁眠。姑苏城外寒山寺，夜半钟声到客船。","作者":"张继","朝代":"唐代","主题":"旅途孤寂","注释":"枫桥：今江苏苏州枫桥；寒山寺：古寺名，以《枫桥夜泊》闻名。","赏析":"首句以寒夜、霜天烘托出凄凉氛围，次句写江面渔火与枫树相映，抒发旅人思乡之情；末句钟声穿透夜色，映衬出诗人心中的孤独与惆怅。","背景介绍":"张继在贬官途中经过枫桥，夜宿江边，因闻钟声而作此诗，成为描写江南水乡夜景的名篇。","配图URL":"https://example.com/images/fengqiao_yepao.jpg","id":71},{"诗词ID":1002,"诗词标题":"《黄鹤楼送孟浩然》","诗词全文":"故人西辞黄鹤楼，烟花三月下扬州。孤帆远影碧空尽，唯见长江天际流。","作者":"李白","朝代":"唐代","主题":"送别","注释":"黄鹤楼：武汉名楼；扬州：古都，春季繁花似锦。","赏析":"首句写送别情景，次句点明目的地与时节，后两句以浩渺江水与孤帆象征离别的悠长与不舍。","背景介绍":"李白与孟浩然在黄鹤楼相送，诗中表达了对友人远行的惆怅与祝福。","配图URL":"https://example.com/images/huanghe_lou.jpg","id":72},{"诗词ID":1003,"诗词标题":"《江城子·密州出猎》","诗词全文":"老夫聊发少年狂，左牵黄，右擎苍。锦帽貂裘，千骑卷平冈。为报倾城，尽日飞花，春风十里扬州路。","作者":"苏轼","朝代":"宋代","主题":"豪放壮志","注释":"密州：今山东诸城；黄、苍指猎犬。","赏析":"全词气势磅礴，描绘出词人出猎的豪情壮志，借古代狩猎场面抒发胸中豪情。","背景介绍":"苏轼任密州太守时，组织狩猎以安抚边民，作此词以记盛况。","配图URL":"https://example.com/images/jiangchengzi_mizhou.jpg","id":73},{"诗词ID":1004,"诗词标题":"《秋夜将晓出篱门迎凉有感二首·其五》","诗词全文":"银烛秋光冷画屏，轻罗小扇扑流萤。天阶夜色凉如水，梦里归来是故乡。","作者":"杜牧","朝代":"唐代","主题":"秋思","注释":"银烛：秋夜灯光；轻罗小扇：古代女子用扇。","赏析":"用细腻的意象描写秋夜的清凉与寂寥，结尾点出思乡之情，情景交融。","背景介绍":"杜牧在郊外秋夜独坐，感怀故土，遂作此诗。","配图URL":"https://example.com/images/qiuye_zhang.jpg","id":74},{"诗词ID":1005,"诗词标题":"《临江仙·滚滚长江东逝水》","诗词全文":"滚滚长江东逝水，浪花淘尽英雄。是非成败转头空，青山依旧在，几度夕阳红。","作者":"杨慎","朝代":"明代","主题":"历史感慨","注释":"滚滚长江：象征历史长河；英雄：指历代人物。","赏析":"以江水奔流比喻历史的无情，抒发作者对世事沧桑的感慨，语言慷慨激昂。","背景介绍":"明代文人杨慎在江边观潮，感慨历史兴衰，写下此词。","配图URL":"https://example.com/images/longjiang.jpg","id":75},{"诗词ID":1006,"诗词标题":"《山居秋暝》","诗词全文":"空山新雨后，天气晚来秋。明月松间照，清泉石上流。","作者":"王维","朝代":"唐代","主题":"山水隐逸","注释":"空山：无人山谷；新雨后：雨后清新。","赏析":"四句描绘雨后山林的清幽景致，意境空灵，表现诗人归隐自然的淡泊心境。","背景介绍":"王维隐居山林时，雨后散步所见，写成此诗。","配图URL":"https://example.com/images/shanju_qiu.jpg","id":76},{"诗词ID":1007,"诗词标题":"《春夜洛城寺》","诗词全文":"灯火阑珊处，梵音随风起。古塔倚云端，禅心如水澈。","作者":"白居易","朝代":"唐代","主题":"禅意夜景","注释":"阑珊：灯火稀疏；梵音：佛教音乐。","赏析":"通过灯火、梵音、古塔的描写，营造出宁静的禅意夜景，表现诗人对佛法的向往。","背景介绍":"白居易在洛阳寺夜宿，听梵音而作。","配图URL":"https://example.com/images/chunye_luochen.jpg","id":77},{"诗词ID":1008,"诗词标题":"《夜泊牛渚怀古》","诗词全文":"牛渚西江夜，潮声入梦来。古战场犹在，星河映水白。","作者":"杜甫","朝代":"唐代","主题":"怀古思今","注释":"牛渚：长江三峡之一；潮声：江水拍岸声。","赏析":"以夜泊江边的潮声与星光映照，唤起对古战场的追忆，情景交织，感慨历史沧桑。","背景介绍":"杜甫流寓江陵，夜宿牛渚，凭吊三国遗址。","配图URL":"https://example.com/images/niu_zhu.jpg","id":78},{"诗词ID":1009,"诗词标题":"《渔舟唱晚》","诗词全文":"暮色沉江水，渔歌随波去。桨声轻敲岸，星光点点露。","作者":"刘禹锡","朝代":"唐代","主题":"田园暮色","注释":"渔舟：捕鱼的小船；暮色：黄昏的光线。","赏析":"描写渔民黄昏归航的宁静画面，语言柔和，情感温暖。","背景介绍":"刘禹锡任职江州时，常观渔民暮归，作此诗抒情。","配图URL":"https://example.com/images/yu_zhou_changwan.jpg","id":79},{"诗词ID":1010,"诗词标题":"《梅花》","诗词全文":"墙角数枝梅，凌寒独自开。遥看春色远，香满雪中来。","作者":"王安石","朝代":"宋代","主题":"坚韧不拔","注释":"凌寒：在严寒中开放。","赏析":"以梅花独自开放的形象象征高洁人格，语言简练却意蕴深远。","背景介绍":"王安石任职期间，北方寒冬，见梅而作。","配图URL":"https://example.com/images/meihua_wanganshi.jpg","id":80},{"诗词ID":1011,"诗词标题":"《春江花月夜》","诗词全文":"春江潮水连海平，海上明月共潮生。江畔何人初见月，举杯邀月对影成。","作者":"张若虚","朝代":"唐代","主题":"月夜情怀","注释":"潮生：潮汐上升。","赏析":"全诗以江潮、明月交相辉映，抒发对美好时光的赞叹与思索。","背景介绍":"张若虚在春江泛舟，夜观月色而作。","配图URL":"https://example.com/images/chunjiang_yueye.jpg","id":81},{"诗词ID":1012,"诗词标题":"《九歌·东皇太一》","诗词全文":"东皇太一兮，帝之所居。万物生光，天地共祀。","作者":"屈原","朝代":"战国","主题":"祭祀天地","注释":"东皇太一：古代最高神祇。","赏析":"篇章庄严宏大，语言古朴，体现古代祭祀仪式的神圣感。","背景介绍":"屈原为楚王祭祀东皇太一所作，后收录于《楚辞》。","配图URL":"https://example.com/images/jiuge_donghuang.jpg","id":82},{"诗词ID":1013,"诗词标题":"《夜雨寄北》","诗词全文":"君问归期未有期，巴山夜雨涨秋池。何当共剪西窗烛，却话巴山旧时事。","作者":"李商隐","朝代":"唐代","主题":"离别相思","注释":"巴山：今四川巴县。","赏析":"以雨声暗示思念，层层递进的情感表达细腻动人。","背景介绍":"李商隐被贬巴蜀，思念故乡与亲友，写此寄北。","配图URL":"https://example.com/images/yeyu_jibei.jpg","id":83},{"诗词ID":1014,"诗词标题":"《咏柳》","诗词全文":"碧条轻舞春风里，柔枝摇曳映日斜。万条丝线随意垂，绿意盎然入画图。","作者":"贺知章","朝代":"唐代","主题":"春景赞美","注释":"碧条：绿色的柳枝。","赏析":"用动感的笔触描绘柳枝的柔美，语言轻盈，富有画面感。","背景介绍":"贺知章在洛阳春游时，看到垂柳而作。","配图URL":"https://example.com/images/yongliu_hezhizhang.jpg","id":84},{"诗词ID":1015,"诗词标题":"《秋思》","诗词全文":"银烛秋光冷画屏，轻罗小扇扑流萤。天阶夜色凉如水，梦里归来是故乡。","作者":"张继","朝代":"唐代","主题":"秋夜思乡","注释":"银烛：秋夜灯光；流萤：萤火虫。","赏析":"通过细腻的秋夜意象，抒发诗人漂泊中的思乡之情，情景交融。","背景介绍":"张继在江南秋夜旅宿，怀念故乡而作。","配图URL":"https://example.com/images/qiusi_zhangji.jpg","id":85},{"诗词ID":1016,"诗词标题":"《送别》","诗词全文":"山中相送别，泪湿春衫袖。回首故园路，云烟散不收。","作者":"王之涣","朝代":"唐代","主题":"离情别绪","注释":"泪湿春衫袖：形容离别时的悲伤。","赏析":"短短数句即把送别的凄凉与不舍表现得淋漓尽致，情感真挚。","背景介绍":"王之涣送友人远行，作此送别诗。","配图URL":"https://example.com/images/songbie_wangzhihuan.jpg","id":86},{"诗词ID":1017,"诗词标题":"《相思》","诗词全文":"红豆生南国，春来发几枝。愿君多采撷，此物最相思。","作者":"王维","朝代":"唐代","主题":"相思之情","注释":"红豆：古代相思象征。","赏析":"以红豆喻相思，语言简洁却情意绵长，成为千古相思名句。","背景介绍":"王维在长安思念远在南方的友人，写此诗以寄情。","配图URL":"https://example.com/images/xiangsi_wangwei.jpg","id":87},{"诗词ID":1018,"诗词标题":"《登岳阳楼》","诗词全文":"昔闻洞庭水，今上岳阳楼。万里悲秋常作客，百年多病独登楼。","作者":"杜甫","朝代":"唐代","主题":"人生感慨","注释":"洞庭：洞庭湖；岳阳楼：古名楼。","赏析":"借登楼远眺之景，抒发身世漂泊、沧桑感慨，情深意重。","背景介绍":"杜甫晚年流寓岳阳，登楼作此诗。","配图URL":"https://example.com/images/deng_yueyanglou.jpg","id":88},{"诗词ID":1019,"诗词标题":"《春望》","诗词全文":"国破山河在，城春草木深。感时花溅泪，恨别鸟惊心。","作者":"杜甫","朝代":"唐代","主题":"国乱思乡","注释":"国破：指安史之乱。","赏析":"以春景映衬国破家亡的沉痛，情景交织，慨叹深沉。","背景介绍":"安史之乱后，杜甫在长安城外目睹春景而作。","配图URL":"https://example.com/images/chunwang_dufu.jpg","id":89}];(function(d){try{if(Array.isArray(d)){["items","list","data","records","rows","all","results","content"].forEach(function(k){try{if(d[k]===undefined)d[k]=d;}catch(e){}});}window.APP_LIST=Array.isArray(d)?d:[];window.getById=function(id){return window.APP_LIST.find(function(x){return x&&String(x.id)===String(id);})||null;};}catch(e){}})(window.APP_DATA);</script>

<title>唐诗三百首</title>
<style>
    :root{
        --primary:#3498db;
        --accent:#f1c40f;
        --success:#2ecc71;
        --bg:#fff;
        --text:#333;
        --radius:8px;
        --gap:16px;
        --pad:16px;
        --font-sans:"PingFang SC","Microsoft YaHei",sans-serif;
    }
    body{
        margin:0;
        font-family:var(--font-sans);
        background:var(--bg);
        color:var(--text);
        line-height:1.6;
        padding-top:80px; /* space for injected header */
    }
    main{
        max-width:1200px;
        margin:0 auto;
        padding:var(--pad);
    }
    h1{
        text-align:center;
        margin:var(--gap) 0;
        color:var(--primary);
        font-size:1.8rem;
    }
    .poem-list{
        display:grid;
        grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
        gap:var(--gap);
    }
    .poem-card{
        background:var(--bg);
        border-radius:var(--radius);
        box-shadow:0 2px 6px rgba(0,0,0,0.1);
        padding:var(--pad);
        display:flex;
        flex-direction:column;
        justify-content:space-between;
    }
    .poem-card h2{
        margin:0 0 8px;
        font-size:1.2rem;
        color:var(--primary);
    }
    .poem-card p{
        margin:4px 0;
        font-size:0.95rem;
    }
    .poem-card a{
        margin-top:12px;
        align-self:flex-start;
        text-decoration:none;
        color:#fff;
        background:var(--primary);
        padding:6px 12px;
        border-radius:4px;
        font-size:0.9rem;
        transition:background 0.3s;
    }
    .poem-card a:hover{
        background:var(--accent);
    }
    @media (max-width:600px){
        body{padding-top:120px;}
